<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; margin-right: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-save { background-color: #28a745; }
        .btn-show { background-color: #007bff; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Registration Form</h2>
    <form id="studentForm">
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Class:</label>
            <input type="text" id="studentClass" required>
        </div>
        <div class="form-group">
            <label>Age:</label>
            <input type="number" id="age" required>
        </div>
        <div class="form-group">
            <label>Major Subject:</label>
            <input type="text" id="majorSubject" required>
        </div>
        <div class="form-group">
            <label>Hobby:</label>
            <input type="text" id="hobby" required>
        </div>
        <button type="submit" class="btn-save">Save Data</button>
        <button type="button" class="btn-show" id="showBtn">Show Data</button>
    </form>

    <div id="dataDisplay">
        <h3>Registered Students</h3>
        <table id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Age</th>
                    <th>Major Subject</th>
                    <th>Hobby</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <!-- Data yahan dynamic load hoga -->
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
